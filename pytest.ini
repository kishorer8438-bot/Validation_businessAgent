[pytest]
python_files = test_*.py
testpaths = tests
norecursedirs = .venv rag_project .git .pytest_cache __pycache__
addopts = --ignore=test_output.txt

# Enforce minimum coverage threshold (requires pytest-cov)
; To use, run pytest with pytest-cov plugin. Fails if total coverage < 90%.
; Example: pytest --cov=src --cov-report=term-missing --cov-fail-under=90
pythonpath = .
